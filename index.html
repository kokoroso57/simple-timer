<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイマー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 { font-size: 1.2rem; letter-spacing: 0.2em; color: #a0a0c0; margin-bottom: 2rem; }

    .display {
      font-size: 6rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      color: #e0e0ff;
      margin-bottom: 2rem;
      transition: color 0.3s;
    }

    .display.warning { color: #ff9966; }
    .display.danger  { color: #ff4444; }

    .set-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .set-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .set-group label { font-size: 0.75rem; color: #808090; letter-spacing: 0.1em; }

    .set-group input {
      width: 5rem;
      text-align: center;
      font-size: 1.4rem;
      background: #16213e;
      border: 1px solid #30305a;
      border-radius: 8px;
      color: #eee;
      padding: 0.4rem;
    }

    .set-group input:focus { outline: none; border-color: #7070cc; }

    .buttons {
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.7rem 1.8rem;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.35; cursor: default; }

    #btnStart  { background: #4c6ef5; color: #fff; }
    #btnPause  { background: #f0a500; color: #fff; }
    #btnReset  { background: #30305a; color: #ccc; }
  </style>
</head>
<body>
  <h1>TIMER</h1>
  <div class="display" id="display">00:00</div>

  <div class="set-row">
    <div class="set-group">
      <label>分</label>
      <input type="number" id="inputMin" value="5" min="0" max="99">
    </div>
    <div class="set-group">
      <label>秒</label>
      <input type="number" id="inputSec" value="0" min="0" max="59">
    </div>
  </div>

  <div class="buttons">
    <button id="btnStart">開始</button>
    <button id="btnPause" disabled>一時停止</button>
    <button id="btnReset">リセット</button>
  </div>

  <script>
    const display  = document.getElementById('display');
    const btnStart = document.getElementById('btnStart');
    const btnPause = document.getElementById('btnPause');
    const btnReset = document.getElementById('btnReset');
    const inputMin = document.getElementById('inputMin');
    const inputSec = document.getElementById('inputSec');

    let remaining = 0;
    let interval  = null;
    let running   = false;

    function fmt(s) {
      const m = Math.floor(s / 60).toString().padStart(2, '0');
      const sec = (s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    function updateColor() {
      display.classList.remove('warning', 'danger');
      if (remaining <= 10) display.classList.add('danger');
      else if (remaining <= 30) display.classList.add('warning');
    }

    // 阪神応援風ファンファーレ
    // メロディ: C5→E5→G5→C6(長)→G5→E5→C6(長) ブラス音色で
    function playFanfare() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      // ブラス風音色: ノコギリ波 + ローパスフィルタ + 倍音補強
      function playBrass(freq, startTime, duration, volume = 0.45) {
        const gain   = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type            = 'lowpass';
        filter.frequency.value = 2200;
        filter.Q.value         = 1.2;

        // 基音 (sawtooth)
        const osc1 = ctx.createOscillator();
        osc1.type = 'sawtooth';
        osc1.frequency.value = freq;

        // 5度上の倍音で厚み
        const osc2 = ctx.createOscillator();
        osc2.type = 'square';
        osc2.frequency.value = freq * 1.5;
        const osc2Gain = ctx.createGain();
        osc2Gain.gain.value = 0.18;

        // 2倍音(オクターブ)
        const osc3 = ctx.createOscillator();
        osc3.type = 'sawtooth';
        osc3.frequency.value = freq * 2;
        const osc3Gain = ctx.createGain();
        osc3Gain.gain.value = 0.10;

        osc1.connect(filter);
        osc2.connect(osc2Gain); osc2Gain.connect(filter);
        osc3.connect(osc3Gain); osc3Gain.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);

        // アタック → サステイン → リリース
        const atk = 0.02;
        const rel = Math.min(0.12, duration * 0.25);
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(volume, startTime + atk);
        gain.gain.setValueAtTime(volume, startTime + duration - rel);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

        [osc1, osc2, osc3].forEach(o => {
          o.start(startTime);
          o.stop(startTime + duration + 0.05);
        });
      }

      // バスドラ
      function playKick(startTime) {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(160, startTime);
        osc.frequency.exponentialRampToValueAtTime(40, startTime + 0.12);
        gain.gain.setValueAtTime(1.0, startTime);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.18);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(startTime); osc.stop(startTime + 0.2);
      }

      // スネア風
      function playSnare(startTime) {
        const bufSize = ctx.sampleRate * 0.1;
        const buf  = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
        const src   = ctx.createBufferSource();
        src.buffer  = buf;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 2500;
        filter.Q.value = 0.8;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.35, startTime);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.1);
        src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        src.start(startTime); src.stop(startTime + 0.12);
      }

      const t = ctx.currentTime + 0.05;
      const q = 0.13; // 16分音符長

      // ---- ファンファーレ本体 ----
      // フレーズ1: タッタタタ ↑↑↑
      // C5=523, E5=659, G5=784, C6=1047, A5=880, Bb5=932
      const C5=523, E5=659, G5=784, C6=1047, A5=880, Bb5=932, D5=587, F5=698;

      // 導入: ドッ・ドッ (キック2発)
      playKick(t);
      playKick(t + q);

      // フレーズ: ド ミ ソ ド（短・短・短・長）
      playBrass(C5, t + q*2,       q*1.0, 0.45);
      playBrass(E5, t + q*3,       q*1.0, 0.45);
      playBrass(G5, t + q*4,       q*1.0, 0.45);
      playBrass(C6, t + q*5,       q*2.5, 0.55);
      playKick(t + q*5);

      // フレーズ2: ソ ラ ソ ミ ド（下降感）
      playBrass(G5, t + q*8,       q*1.0, 0.42);
      playBrass(A5, t + q*9,       q*1.0, 0.42);
      playBrass(G5, t + q*10,      q*1.0, 0.42);
      playBrass(E5, t + q*11,      q*1.0, 0.42);
      playBrass(C5, t + q*12,      q*2.0, 0.42);

      // フィナーレ: ドミソド（高らかに！）
      playBrass(C5, t + q*15,      q*0.8, 0.50);
      playBrass(E5, t + q*15.8,    q*0.8, 0.50);
      playBrass(G5, t + q*16.6,    q*0.8, 0.52);
      playBrass(C6, t + q*17.4,    q*3.5, 0.60);
      playKick(t + q*17.4);
      playSnare(t + q*17.4 + 0.05);
      playKick(t + q*17.4 + 0.2);
    }

    function tick() {
      if (remaining <= 0) {
        clearInterval(interval);
        running = false;
        display.textContent = '00:00';
        display.classList.add('danger');
        btnStart.disabled = false;
        btnPause.disabled = true;
        playFanfare();
        return;
      }
      remaining--;
      display.textContent = fmt(remaining);
      updateColor();
    }

    btnStart.addEventListener('click', () => {
      if (!running) {
        if (remaining === 0) {
          const m = parseInt(inputMin.value) || 0;
          const s = parseInt(inputSec.value) || 0;
          remaining = m * 60 + s;
          if (remaining === 0) return;
        }
        display.textContent = fmt(remaining);
        updateColor();
        interval = setInterval(tick, 1000);
        running = true;
        btnStart.disabled = true;
        btnPause.disabled = false;
      }
    });

    btnPause.addEventListener('click', () => {
      clearInterval(interval);
      running = false;
      btnStart.disabled = false;
      btnPause.disabled = true;
    });

    btnReset.addEventListener('click', () => {
      clearInterval(interval);
      running = false;
      remaining = 0;
      display.textContent = fmt(0);
      display.classList.remove('warning', 'danger');
      btnStart.disabled = false;
      btnPause.disabled = true;
    });
  </script>
</body>
</html>
